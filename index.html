<!doctype html>
<html lang="en">

    <title>Claude: Harvest Code</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #1a1410; }

        font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
